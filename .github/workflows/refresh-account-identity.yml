name: Refresh Account Identity

# Fetches personal account chain identities FIRST-PARTY via the Bittensor SDK
# (#4324/5.1 — chain-direct, no Taostats, no API key) and loads them into the
# metagraphed-health D1 `account_identity` table. Distinct from subnet identity
# (refresh-native-subnets.yml's SubnetIdentitiesV3 capture) — this is the
# identity an account attaches to itself. Zero extra RPC cost beyond one
# get_all_metagraphs_info call: MetagraphInfo already carries per-UID identities
# alongside owning accounts (see scripts/fetch-account-identity.py's docstring). Daily
# (identities change rarely). Signed (sign-staged-neurons.mjs, reused unchanged)
# before staging to R2; the Worker authenticates + bounds it before loading into
# D1 via its binding (loadStagedAccountIdentity) — no API-token D1 permission
# required. Mirrors refresh-subnet-hyperparams.yml's fetch/sign-and-stage split
# exactly.
on:
  schedule:
    - cron: "29 7 * * *" # daily 07:29 UTC — distinct minute from the other daily refreshes
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: refresh-account-identity
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # one get_all_metagraphs_info call, no per-account RPC loop
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # First-party chain-direct fetch (pinned bittensor, matching refresh-metagraph):
      # one get_all_metagraphs_info call yields every subnet's per-UID coldkeys +
      # identities in a single round trip — no per-account storage query loop.
      - name: Fetch account identities (Bittensor SDK)
        run: uvx --from bittensor==10.4.0 python scripts/fetch-account-identity.py
        env:
          # Same hidden chain-RPC secret as the metagraph/events fetches (ADR 0012).
          # Unset → the script defaults to "finney"; set it to the private node URL
          # to route the fetch through our own infra without exposing it.
          SUBTENSOR_RPC_URL: ${{ secrets.SUBTENSOR_RPC_URL }}

      - name: Upload unsigned identity snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: account-identity-unsigned
          path: dist/metagraph-account-identity.json
          if-no-files-found: error
          retention-days: 1

  sign-and-stage:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Keep the secret-bearing job in a fresh workspace. The unpinned PyPI
      # execution boundary above can only pass the JSON data artifact forward, not
      # mutated repository scripts, shell startup files, or node_modules.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1

      - name: Install
        run: npm ci

      - name: Download unsigned identity snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: account-identity-unsigned
          path: dist

      # scripts/sign-staged-neurons.mjs is generic over any bare-array snapshot
      # (no neuron-specific logic) — reused unchanged rather than duplicating it.
      - name: Sign staged identity snapshot
        run: node scripts/sign-staged-neurons.mjs dist/metagraph-account-identity.json
        env:
          METAGRAPH_STAGING_SIGNING_KEY: ${{ secrets.METAGRAPH_STAGING_SIGNING_KEY }}

      # Stage the signed snapshot to R2 (the token's existing R2 permission); the
      # Worker authenticates + bounds it before loading into D1 via its binding.
      - name: Stage identity snapshot to R2 for the Worker to load into D1
        run: npx wrangler r2 object put metagraphed-artifacts/metagraph/account-identity-pending.json --file=dist/metagraph-account-identity.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # #4832 gap-closure: ALSO write the same signed snapshot to the Postgres
      # write path (workers/data-api.mjs's handleAccountIdentitySync),
      # alongside (not replacing) the R2/D1 step above -- mirrors
      # refresh-subnet-hyperparams.yml's sync step exactly.
      - name: Sync account identities to the Postgres write path (#4832 gap-closure)
        run: |
          if [ -z "$ACCOUNT_IDENTITY_SYNC_SECRET" ]; then
            echo "ACCOUNT_IDENTITY_SYNC_SECRET not set; skipping Postgres sync"
            exit 0
          fi
          curl -fsS -X POST "https://api.metagraph.sh/api/v1/internal/account-identity-sync" \
            -H "x-account-identity-sync-token: ${ACCOUNT_IDENTITY_SYNC_SECRET}" \
            -H "content-type: application/json" \
            --data-binary @dist/metagraph-account-identity.json \
            || echo "::warning::account-identity-sync Postgres write failed; D1 path (this job's real dependency) is unaffected"
        env:
          ACCOUNT_IDENTITY_SYNC_SECRET: ${{ secrets.ACCOUNT_IDENTITY_SYNC_SECRET }}

  notify-on-failure:
    needs: [fetch, sign-and-stage]
    if: ${{ always() && (needs.fetch.result == 'failure' || needs.sign-and-stage.result == 'failure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify on failure
        env:
          METAGRAPH_ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$METAGRAPH_ALERT_WEBHOOK_URL" ]; then
            exit 0
          fi
          curl -fsS -X POST "$METAGRAPH_ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d '{"content":"🔴 metagraphed refresh-account-identity FAILED — the account_identity D1 tier may go stale."}'
