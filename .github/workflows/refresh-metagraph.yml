name: Refresh Metagraph (per-UID neurons)

# Fetches the per-UID metagraph for every subnet FIRST-PARTY via the Bittensor SDK
# (#1348 — chain-direct, no Taostats, no API key) and loads it into the
# chain-indexer Postgres's `neurons`/`neuron_daily` tables (#4771). Powers
# /api/v1/subnets/{netuid}/metagraph, /neurons/{uid}, /validators, and the account
# entity API (#1347). Daily + manual. The snapshot is signed
# (sign-staged-neurons, kept for its HMAC signing utility) then POSTed straight
# to the Postgres write path (workers/data-api.mjs's handleNeuronsSync) —
# no D1 involved. D1's `neurons`/`neuron_daily` tables, their R2-stage-to-D1
# loader (loadStagedNeurons), and the D1-side daily rollup/archive/prune cron
# are retired (#4772 D1 chain-data retirement); this workflow's Postgres sync
# step (previously a best-effort "#4771 verification window" mirror) is now
# this job's sole, required write path.
on:
  schedule:
    - cron: "23 5 * * *" # daily 05:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: refresh-metagraph
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # one get_all_metagraphs_info call + per-subnet storage reads
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # First-party chain-direct fetch (pinned bittensor, matching sync-subnets):
      # get_all_metagraphs_info for the per-UID core + SubtensorModule.ValidatorTrust
      # storage; rank is derived from incentive. Units parity-verified vs the prior
      # Taostats source (#1348). No Taostats, no API key.
      - name: Fetch per-UID metagraph (Bittensor SDK)
        run: uvx --from bittensor==10.4.0 python scripts/fetch-metagraph-native.py
        env:
          # Same hidden chain-RPC secret as the events poller (ADR 0012 / #1349).
          # Unset → the script defaults to "finney"; set it to the private node URL
          # to route the metagraph fetch through our own infra without exposing it.
          SUBTENSOR_RPC_URL: ${{ secrets.SUBTENSOR_RPC_URL }}

      - name: Upload unsigned neuron snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: metagraph-neurons-unsigned
          path: dist/metagraph-neurons.json
          if-no-files-found: error
          retention-days: 1

  sign-and-stage:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Keep the secret-bearing job in a fresh workspace. The unpinned PyPI
      # execution boundary above can only pass the JSON data artifact forward, not
      # mutated repository scripts, shell startup files, or node_modules.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1

      - name: Install
        run: npm ci

      - name: Download unsigned neuron snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: metagraph-neurons-unsigned
          path: dist

      - name: Sign staged neuron snapshot
        run: node scripts/sign-staged-neurons.mjs dist/metagraph-neurons.json
        env:
          METAGRAPH_STAGING_SIGNING_KEY: ${{ secrets.METAGRAPH_STAGING_SIGNING_KEY }}

      # #4772 D1 chain-data retirement: the sole write path now (previously a
      # best-effort "#4771 verification window" mirror alongside the R2/D1
      # stage step, which is removed). A failure here fails this job --
      # correct now that Postgres, not D1, is what's actually served.
      - name: Sync neurons to the Postgres write path
        run: |
          curl -fsS -X POST "https://api.metagraph.sh/api/v1/internal/neurons-sync" \
            -H "x-neurons-sync-token: ${NEURONS_SYNC_SECRET}" \
            -H "content-type: application/json" \
            --data-binary @dist/metagraph-neurons.json
        env:
          NEURONS_SYNC_SECRET: ${{ secrets.NEURONS_SYNC_SECRET }}

  notify-on-failure:
    needs: [fetch, sign-and-stage]
    if: ${{ always() && (needs.fetch.result == 'failure' || needs.sign-and-stage.result == 'failure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify on failure
        env:
          METAGRAPH_ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$METAGRAPH_ALERT_WEBHOOK_URL" ]; then
            exit 0
          fi
          curl -fsS -X POST "$METAGRAPH_ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d '{"content":"🔴 metagraphed refresh-metagraph FAILED — the per-UID neurons/neuron_daily Postgres tier may go stale."}'
