# Gittensory Gate scope manifest for metagraphed.
#
# wantedPaths  — patterns that signal this PR is a community data contribution
#                (auto-adjudicate: merge/close/escalate on the gate's rules).
# blockedPaths — if ANY changed file matches here the PR is NOT a community
#                data submission (hold for human review / do not auto-merge).
#
# Aligns with the paths: filter in .github/workflows/publish-cloudflare.yml so
# the gate's adjudication scope exactly tracks what a merged data PR publishes.

wantedPaths:
  - "registry/subnets/**"
  - "registry/providers/**"
  # registry/candidates/community/** — retired lane, no longer a valid PR path.
  # Community surfaces now live in registry/subnets/<slug>.json (see CONTRIBUTING.md).
  - "registry/reviews/**"
  - "registry/adapters/**"

blockedPaths:
  # Root files can control trusted workflows, dependencies, deploys, or the
  # gate itself. Any root-file edit makes the PR a maintainer-reviewed change,
  # not an autonomously mergeable community data submission.
  - "*"
  - ".*"
  - "src/**"
  - "scripts/**"
  - "workers/**"
  - "schemas/**"
  - "tests/**"
  - "migrations/**"
  - "packages/**"
  - "public/**"
  - ".github/**"
  - ".claude/**"
  # apps/ui — the frontend workspace (#3062). Owner-branch/maintainer-only
  # work (repo-structure, CI, and Cloudflare deploy surgery), never a
  # community data submission.
  - "apps/**"

# Review-evasion protection (config-as-code override; layered OVER the dashboard's own default of
# "off"): closing or converting-to-draft your OWN PR while gittensory has an active review pass
# running, a prior recorded gate failure, or a repeated ready<->draft cycle on this PR, is treated
# as dodging the one-shot review rather than an ordinary action.
settings:
  reviewEvasionProtection: close
